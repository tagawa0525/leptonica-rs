name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4

      - uses: dtolnay/rust-toolchain@ef4e0b8bee46222890f942fd8c368792abf192eb # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@60eaf308e9556e6520284586925d6da4e91bb95c # v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: test
        run: cargo test --all-features
